<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingliz tili so'zlari - Õrganish</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.3s ease;
        }
        
        .word-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .word-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .word-number {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .word-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .word-section {
            flex: 1;
        }
        
        .word-section label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .word-section p {
            font-size: 18px;
            color: #333;
            font-weight: bold;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }
        
        .input-section {
            flex: 1;
        }
        
        .input-section label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .input-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-section input.correct {
            border-color: #28a745;
            background: #f0fff4;
        }
        
        .input-section input.incorrect {
            border-color: #dc3545;
            background: #fff5f5;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        .check-btn, .clear-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .check-btn {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .check-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .check-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .clear-btn {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .clear-btn:hover {
            background: #e8e8e8;
        }
        
        .feedback {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
        
        .feedback.correct {
            color: #28a745;
            display: block;
        }
        
        .feedback.incorrect {
            color: #dc3545;
            display: block;
        }
        
        .summary {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .summary h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .summary p {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }
        
        .reset-all-btn {
            background: #764ba2;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .reset-all-btn:hover {
            background: #5a3a7a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Ingliz tili so'zlari</h1>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        
        <div id="wordsContainer"></div>
        
        <div class="summary" id="summary">
            <h2>Tabriklaymiz! ✨</h2>
            <p id="scoreText">Barcha so'zlarni to'g'ri o'qiganingiz!</p>
            <button class="reset-all-btn" onclick="resetAll()">Qayta boshlash</button>
        </div>
    </div>
    
    <script>
        const words = [
            { english: "angry", uzbek: "jahldor, achchiqlangan 😡" },
            { english: "awful", uzbek: "juda yomon" },
            { english: "boring", uzbek: "zerikarli" },
            { english: "busy", uzbek: "band" },
            { english: "comfortable", uzbek: "qulay" },
            { english: "delicious", uzbek: "mazali" },
            { english: "different", uzbek: "boshqa, farqli" },
            { english: "difficult", uzbek: "qiyin" },
            { english: "early", uzbek: "erta" },
            { english: "easy", uzbek: "oson" },
            { english: "expensive", uzbek: "qimmat" },
            { english: "favorite", uzbek: "eng sevimli" },
            { english: "free", uzbek: "bepul, bo'sh" },
            { english: "great", uzbek: "ajoyib, zo'r" },
            { english: "hard", uzbek: "qattiq, qiyin" },
            { english: "interesting", uzbek: "qiziqarli" },
            { english: "large", uzbek: "katta" },
            { english: "late", uzbek: "kech" },
            { english: "long", uzbek: "uzun" },
            { english: "new", uzbek: "yangi" },
            { english: "nice", uzbek: "yoqimli, yaxshi" },
            { english: "old", uzbek: "eski, qari" },
            { english: "quiet", uzbek: "tinch, shovqinsiz" },
            { english: "short", uzbek: "qisqa" },
            { english: "similar", uzbek: "o'xshash" },
            { english: "simple", uzbek: "oddiy" },
            { english: "strange", uzbek: "g'alati" },
            { english: "terrible", uzbek: "dahshatli, juda yomon" }
        ];
        
        let answers = {};
        
        function initializeWords() {
            const container = document.getElementById('wordsContainer');
            container.innerHTML = '';
            
            words.forEach((word, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                
                const inputId = `input-${index}`;
                answers[inputId] = { word: word.english, checked: false };
                
                card.innerHTML = `
                    <div class="word-number">№${index + 1}</div>
                    <div class="word-info">
                        <div class="word-section">
                            <label>O'zbek tarjimasi</label>
                            <p>${word.uzbek}</p>
                        </div>
                        <div class="input-section">
                            <label>Ingliz tili</label>
                            <input type="text" id="${inputId}" placeholder="So'zni kiriting..." autocomplete="off">
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="check-btn" onclick="checkAnswer('${inputId}')">Tekshirish</button>
                        <button class="clear-btn" onclick="clearInput('${inputId}')">Tozalash</button>
                    </div>
                    <div class="feedback" id="feedback-${inputId}"></div>
                `;
                
                container.appendChild(card);
                
                // Enter tugmasida tekshirish
                document.getElementById(inputId).addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        checkAnswer(inputId);
                    }
                });
            });
        }
        
        function checkAnswer(inputId) {
            const input = document.getElementById(inputId);
            const feedback = document.getElementById(`feedback-${inputId}`);
            const correctAnswer = answers[inputId].word;
            const userAnswer = input.value.trim().toLowerCase();
            
            if (userAnswer === '') {
                feedback.textContent = '⚠️ Iltimos, so\'zni kiriting!';
                feedback.className = 'feedback incorrect';
                return;
            }
            
            if (userAnswer === correctAnswer.toLowerCase()) {
                input.className = 'correct';
                feedback.textContent = '✅ To\'g\'ri!';
                feedback.className = 'feedback correct';
                input.disabled = true;
                answers[inputId].checked = true;
            } else {
                input.className = 'incorrect';
                feedback.textContent = `❌ Noto'g'ri! To'g'ri javob: ${correctAnswer}`;
                feedback.className = 'feedback incorrect';
                input.value = '';
            }
            
            updateProgress();
        }
        
        function clearInput(inputId) {
            const input = document.getElementById(inputId);
            const feedback = document.getElementById(`feedback-${inputId}`);
            
            if (!input.disabled) {
                input.value = '';
                input.className = '';
                feedback.textContent = '';
                feedback.className = 'feedback';
            }
        }
        
        function updateProgress() {
            const checked = Object.values(answers).filter(a => a.checked).length;
            const total = Object.values(answers).length;
            const percentage = Math.round((checked / total) * 100);
            
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressFill').textContent = percentage + '%';
            
            if (percentage === 100) {
                setTimeout(showSummary, 500);
            }
        }
        
        function showSummary() {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('scoreText').textContent = `Siz barcha ${words.length} ta so'zni to'g'ri o'qiganingiz! 🎉`;
        }
        
        function resetAll() {
            answers = {};
            document.getElementById('summary').style.display = 'none';
            initializeWords();
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressFill').textContent = '0%';
        }
        
        // Sahifani yuklashda so'zlarni boshlash
        window.addEventListener('load', initializeWords);
    </script>
</body>
</html>
