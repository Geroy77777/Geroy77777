<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-shaxs Singular Feallari - O'rganish</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.3s ease;
            font-size: 12px;
        }
        
        .section-title {
            background: #667eea;
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .section-title:first-of-type {
            margin-top: 0;
        }
        
        .word-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .word-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .word-number {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .word-info {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .word-section {
            flex: 1;
        }
        
        .word-section label {
            display: block;
            color: #666;
            font-size: 10px;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .word-section p {
            font-size: 15px;
            color: #333;
            font-weight: bold;
            padding: 10px;
            background: white;
            border-radius: 5px;
            word-break: break-word;
            min-height: 45px;
            display: flex;
            align-items: center;
        }
        
        .input-section {
            flex: 1;
        }
        
        .input-section label {
            display: block;
            color: #666;
            font-size: 10px;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .input-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            font-size: 13px;
            transition: border-color 0.3s ease;
        }
        
        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-section input.correct {
            border-color: #28a745;
            background: #f0fff4;
        }
        
        .input-section input.incorrect {
            border-color: #dc3545;
            background: #fff5f5;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        .check-btn, .clear-btn {
            padding: 10px 12px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .check-btn {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .check-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .check-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .clear-btn {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .clear-btn:hover {
            background: #e8e8e8;
        }
        
        .feedback {
            margin-top: 10px;
            font-size: 12px;
            font-weight: bold;
            display: none;
        }
        
        .feedback.correct {
            color: #28a745;
            display: block;
        }
        
        .feedback.incorrect {
            color: #dc3545;
            display: block;
        }
        
        .summary {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .summary h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .summary p {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }
        
        .reset-all-btn {
            background: #764ba2;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .reset-all-btn:hover {
            background: #5a3a7a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        @media (max-width: 1024px) {
            .word-info {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .word-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 3-shaxs Singular Feallari (She/He/It)</h1>
        <p class="subtitle">Simple Present - Watch + es = Watches</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        
        <div id="wordsContainer"></div>
        
        <div class="summary" id="summary">
            <h2>Tabriklaymiz! ✨</h2>
            <p id="scoreText">Barcha feallarni to'g'ri o'qiganingiz!</p>
            <button class="reset-all-btn" onclick="resetAll()">Qayta boshlash</button>
        </div>
    </div>
    
    <script>
        const words = [
            // She
            { infinitive: "Ko'rmoq", simple: "watch", complex: "watches", section: "She" },
            { infinitive: "O'qitmoq", simple: "teach", complex: "teaches", section: "She" },
            { infinitive: "Tutib qolmoq", simple: "catch", complex: "catches", section: "She" },
            { infinitive: "Yuvmoq", simple: "wash", complex: "washes", section: "She" },
            { infinitive: "Tugashtirmoq", simple: "finish", complex: "finishes", section: "She" },
            { infinitive: "Cho'tkalamoq", simple: "brush", complex: "brushes", section: "She" },
            { infinitive: "Tilak qilmoq", simple: "wish", complex: "wishes", section: "She" },
            { infinitive: "Nashr qilmoq", simple: "publish", complex: "publishes", section: "She" },
            
            // He
            { infinitive: "O'rganmoq", simple: "study", complex: "studies", section: "He" },
            { infinitive: "Ko'tarib olib bormoq", simple: "carry", complex: "carries", section: "He" },
            { infinitive: "Yig'lamoq", simple: "cry", complex: "cries", section: "He" },
            { infinitive: "Harakat qilmoq", simple: "try", complex: "tries", section: "He" },
            { infinitive: "Uchamoq", simple: "fly", complex: "flies", section: "He" },
            { infinitive: "Shoshilmoq", simple: "hurry", complex: "hurries", section: "He" },
            { infinitive: "Xavotirlanmoq", simple: "worry", complex: "worries", section: "He" },
            { infinitive: "Javob bermoq", simple: "reply", complex: "replies", section: "He" },
            { infinitive: "Nusxalamoq", simple: "copy", complex: "copies", section: "He" },
            
            // It
            { infinitive: "O'ynamoq", simple: "play", complex: "plays", section: "It" },
            { infinitive: "Bahramand bo'lmoq", simple: "enjoy", complex: "enjoys", section: "It" },
            { infinitive: "Qolamoq", simple: "stay", complex: "stays", section: "It" },
            { infinitive: "Sotib olmoq", simple: "buy", complex: "buys", section: "It" },
            { infinitive: "Ayitmoq", simple: "say", complex: "says", section: "It" },
            { infinitive: "To'lamoq", simple: "pay", complex: "pays", section: "It" },
            { infinitive: "Vayron qilmoq", simple: "destroy", complex: "destroys", section: "It" },
        ];
        
        let answers = {};
        
        function initializeWords() {
            const container = document.getElementById('wordsContainer');
            container.innerHTML = '';
            
            let currentSection = '';
            
            words.forEach((word, index) => {
                if (word.section !== currentSection) {
                    currentSection = word.section;
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section-title';
                    sectionDiv.textContent = currentSection;
                    container.appendChild(sectionDiv);
                }
                
                const card = document.createElement('div');
                card.className = 'word-card';
                
                const simpleInputId = `simple-${index}`;
                const complexInputId = `complex-${index}`;
                
                answers[simpleInputId] = { word: word.simple, checked: false };
                answers[complexInputId] = { word: word.complex, checked: false };
                
                card.innerHTML = `
                    <div class="word-info">
                        <div class="word-section">
                            <label>O'zbek (-moq)</label>
                            <p>${word.infinitive}</p>
                        </div>
                        <div class="input-section">
                            <label>Qisqartma</label>
                            <input type="text" id="${simpleInputId}" placeholder="watch" autocomplete="off">
                        </div>
                        <div class="input-section">
                            <label>Uzaytma (She/He/It)</label>
                            <input type="text" id="${complexInputId}" placeholder="watches" autocomplete="off">
                        </div>
                        <div class="button-group">
                            <button class="check-btn" onclick="checkBoth('${simpleInputId}', '${complexInputId}')">Tekshirish</button>
                            <button class="clear-btn" onclick="clearBoth('${simpleInputId}', '${complexInputId}')">Tozalash</button>
                        </div>
                    </div>
                    <div class="feedback" id="feedback-${simpleInputId}"></div>
                    <div class="feedback" id="feedback-${complexInputId}"></div>
                `;
                
                container.appendChild(card);
                
                // Enter tugmasida tekshirish
                document.getElementById(simpleInputId).addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        document.getElementById(complexInputId).focus();
                    }
                });
                
                document.getElementById(complexInputId).addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        checkBoth(simpleInputId, complexInputId);
                    }
                });
            });
        }
        
        function checkBoth(simpleInputId, complexInputId) {
            const simpleInput = document.getElementById(simpleInputId);
            const complexInput = document.getElementById(complexInputId);
            const simpleFeedback = document.getElementById(`feedback-${simpleInputId}`);
            const complexFeedback = document.getElementById(`feedback-${complexInputId}`);
            
            const correctSimple = answers[simpleInputId].word;
            const correctComplex = answers[complexInputId].word;
            
            const userSimple = simpleInput.value.trim().toLowerCase();
            const userComplex = complexInput.value.trim().toLowerCase();
            
            let simpleCorrect = false;
            let complexCorrect = false;
            
            if (userSimple === '') {
                simpleFeedback.textContent = '⚠️ Qisqartmani kiriting!';
                simpleFeedback.className = 'feedback incorrect';
            } else if (userSimple === correctSimple.toLowerCase()) {
                simpleInput.className = 'correct';
                simpleFeedback.textContent = '✅ To\'g\'ri!';
                simpleFeedback.className = 'feedback correct';
                simpleInput.disabled = true;
                simpleCorrect = true;
            } else {
                simpleInput.className = 'incorrect';
                simpleFeedback.textContent = `❌ Noto'g'ri! To'g'ri javob: ${correctSimple}`;
                simpleFeedback.className = 'feedback incorrect';
                simpleInput.value = '';
            }
            
            if (userComplex === '') {
                complexFeedback.textContent = '⚠️ Uzaytmani kiriting!';
                complexFeedback.className = 'feedback incorrect';
            } else if (userComplex === correctComplex.toLowerCase()) {
                complexInput.className = 'correct';
                complexFeedback.textContent = '✅ To\'g\'ri!';
                complexFeedback.className = 'feedback correct';
                complexInput.disabled = true;
                complexCorrect = true;
            } else {
                complexInput.className = 'incorrect';
                complexFeedback.textContent = `❌ Noto'g'ri! To'g'ri javob: ${correctComplex}`;
                complexFeedback.className = 'feedback incorrect';
                complexInput.value = '';
            }
            
            if (simpleCorrect && complexCorrect) {
                answers[simpleInputId].checked = true;
                answers[complexInputId].checked = true;
                updateProgress();
            }
        }
        
        function clearBoth(simpleInputId, complexInputId) {
            const simpleInput = document.getElementById(simpleInputId);
            const complexInput = document.getElementById(complexInputId);
            const simpleFeedback = document.getElementById(`feedback-${simpleInputId}`);
            const complexFeedback = document.getElementById(`feedback-${complexInputId}`);
            
            if (!simpleInput.disabled && !complexInput.disabled) {
                simpleInput.value = '';
                simpleInput.className = '';
                simpleFeedback.textContent = '';
                simpleFeedback.className = 'feedback';
                
                complexInput.value = '';
                complexInput.className = '';
                complexFeedback.textContent = '';
                complexFeedback.className = 'feedback';
            }
        }
        
        function updateProgress() {
            const checked = Object.values(answers).filter(a => a.checked).length;
            const total = Object.values(answers).length;
            const percentage = Math.round((checked / total) * 100);
            
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressFill').textContent = percentage + '%';
            
            if (percentage === 100) {
                setTimeout(showSummary, 500);
            }
        }
        
        function showSummary() {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('scoreText').textContent = `Siz barcha ${words.length} ta fealni to'g'ri o'qiganingiz! 🎉`;
        }
        
        function resetAll() {
            answers = {};
            document.getElementById('summary').style.display = 'none';
            initializeWords();
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressFill').textContent = '0%';
        }
        
        // Sahifani yuklashda so'zlarni boshlash
        window.addEventListener('load', initializeWords);
    </script>
</body>
</html>
